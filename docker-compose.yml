version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tradesignal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-tradesignal}
      MYSQL_USER: ${DB_USER:-tradesignal}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tradesignal}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tradesignal-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-tradesignal}
      DB_USER: ${DB_USER:-tradesignal}
      DB_PASSWORD: ${DB_PASSWORD:-tradesignal}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      PYTHON_ENGINE_URL: http://python-engine:8000
      FRONTEND_URL: http://localhost:5173
    depends_on:
      mysql:
        condition: service_healthy
      python-engine:
        condition: service_started

  python-engine:
    build: ./python-engine
    container_name: tradesignal-python
    restart: unless-stopped
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradesignal-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mysql_data:
